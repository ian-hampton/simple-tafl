services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    networks:
      - simple-tafl

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:5000"
    networks:
      - simple-tafl

networks:
  simple-tafl:
    name: simple-tafl
    driver: bridge